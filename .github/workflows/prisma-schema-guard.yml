# Garde-fou anti-P0 (incident 2026-07-06, commit 5fefd57).
# Bloque toute PR où prisma/schema.prisma a été modifié sans migration correspondante,
# AVANT que la branche n'atteigne Vercel. Rejoue les migrations dans un Postgres jetable
# (shadow database) puis compare le résultat à prisma/schema.prisma.
name: Prisma schema guard

on:
  pull_request:
    paths:
      - "prisma/**"
      - ".github/workflows/prisma-schema-guard.yml"

jobs:
  schema-drift:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - run: npm ci

      # Rejoue prisma/migrations dans le shadow DB et compare à prisma/schema.prisma.
      # Exit 2 = le schéma décrit quelque chose qu'aucune migration ne crée -> échec.
      - name: Vérifier la dérive schéma <-> migrations
        run: npm run db:check:strict
