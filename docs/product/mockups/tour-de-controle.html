<style>

</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-brand"><div class="logo">S</div><div class="header-title">Tour de Contrôle <span>· SAFE</span></div></div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" title="Thème"><i data-lucide="moon"></i></button>
      <button class="icon-btn" title="Notifications"><i data-lucide="bell"></i></button>
      <div class="header-avatar">JT</div>
    </div>
  </header>
  <aside class="sidebar">
    <div class="nav-section"><div class="nav-label">Pilotage</div>

  <div class="contract-grid">${contracts.map(c=>`<div class="contract-card"><div class="contract-icon">${icon('file-signature')}</div><div class="contract-name">${c.nom}</div><div class="contract-meta">${c.plan} · ${c.date}</div>${c.statut==='signé'?'<span class="badge badge-success"><span class="badge-dot"></span>Signé</span>':c.statut==='attente'?'<span class="badge badge-warning"><span class="badge-dot"></span>En attente</span>':'<span class="badge badge-neutral"><span class="badge-dot"></span>Brouillon</span>'}</div>`).join('')}</div>`;
}
function pageFacturation(){
  return `<div class="page-head page-head-row"><div><div class="page-title">Facturation</div><div class="page-sub">Factures émises aux cabinets clients</div></div><button class="btn btn-primary" onclick="openModal('facture')">${icon('plus')} Nouvelle facture</button></div>
  <div class="kpi-grid">${kpi('receipt','Facturé ce mois','897 $','','')}${kpi('hourglass','En attente','298 $','','')}${kpi('alert-circle','En retard','99 $','','down')}${kpi('calendar-clock','Délai moyen','8 jours','','')}</div>
  <div class="table-wrap"><table><thead><tr><th>Numéro</th><th>Cabinet</th><th>Date</th><th class="right">Montant</th><th>Statut</th><th class="right">Action</th></tr></thead><tbody>${invoices.map(i=>`<tr><td class="mono">${i.num}</td><td class="cell-firm-name">${i.cabinet}</td><td style="color:var(--text-2)">${i.date}</td><td class="right tnum">${money(i.montant)} $</td><td>${i.statut==='payée'?'<span class="badge badge-success"><span class="badge-dot"></span>Payée</span>':i.statut==='envoyée'?'<span class="badge badge-accent"><span class="badge-dot"></span>Envoyée</span>':'<span class="badge badge-error"><span class="badge-dot"></span>En retard</span>'}</td><td class="right">${i.statut==='retard'?`<button class="btn btn-sm btn-danger" onclick="toast('warning','Mise en demeure générée')">Mise en demeure</button>`:i.statut==='envoyée'?`<button class="btn btn-sm" onclick="toast('info','Relance envoyée')">Relancer</button>`:`<button class="btn btn-sm" onclick="toast('success','PDF téléchargé')">PDF</button>`}</td></tr>`).join('')}</tbody></table></div>`;
}
function pageHeures(){
  return `<div class="page-head"><div class="page-title">Suivi des heures</div><div class="page-sub">Chronomètre et saisie du temps</div></div>
  <div class="timer-card"><div class="timer-display tnum" id="timerDisplay">00:00:00</div><div class="timer-controls"><button class="btn btn-primary" onclick="timerStart()">${icon('play')} Démarrer</button><button class="btn" onclick="timerPause()">${icon('pause')} Pause</button><button class="btn" onclick="timerStop()">${icon('square')} Enregistrer</button></div>
  <div class="timer-selects"><select class="select"><option>Cabinet Roy & Filles</option><option>Derisier Law</option><option>Cabinet Gagnon Avocats</option><option>Interne SAFE</option></select><select class="select"><option>Audit</option><option>Support</option><option>Appel commercial</option><option>Activation module</option><option>Développement</option></select></div></div>
  <div class="section-title">Entrées de la semaine <span class="badge badge-accent tnum"><span class="badge-dot"></span>38,5 h</span></div>
  <div class="table-wrap"><table><thead><tr><th>Date</th><th>Cabinet</th><th>Tâche</th><th class="right">Durée</th><th>Facturable</th><th class="right"></th></tr></thead><tbody id="timeRows">${timeRows()}</tbody></table></div>`;
}
function timeRows(){ return timeEntries.map((e,i)=>`<tr><td style="color:var(--text-2)">${e.date}</td><td class="cell-firm-name">${e.cabinet}</td><td>${e.tache}</td><td class="right tnum">${e.duree}</td><td>${e.facturable?'<span class="badge badge-success"><span class="badge-dot"></span>Oui</span>':'<span class="badge badge-neutral"><span class="badge-dot"></span>Non</span>'}</td><td class="right"><button class="icon-btn" onclick="delTime(${i})">${icon('trash-2')}</button></td></tr>`).join(''); }
function pageParametres(){
  return `<div class="page-head"><div class="page-title">Paramètres</div><div class="page-sub">Profil opérateur et notifications</div></div>
  <div class="grid-2"><div class="card"><div class="section-title">Profil opérateur</div><div class="field"><label>Nom</label><input class="input" value="Jérémie Tiahou" /></div><div class="field"><label>Courriel</label><input class="input" value="jeremie@safecabinet.ca" /></div><button class="btn btn-primary" onclick="toast('success','Profil sauvegardé')">${icon('check')} Sauvegarder</button></div>
  <div class="card"><div class="section-title">Notifications</div><div class="list-row"><div class="list-grow"><div class="list-title">Alertes audit critiques</div><div class="list-sub">Solde négatif, délais dépassés</div></div><div class="switch on" onclick="toggleSwitch(this)"><div class="switch-knob"></div></div></div><div class="list-row"><div class="list-grow"><div class="list-title">Nouveaux deals</div><div class="list-sub">Lead entrant dans le pipeline</div></div><div class="switch on" onclick="toggleSwitch(this)"><div class="switch-knob"></div></div></div><div class="list-row"><div class="list-grow"><div class="list-title">Factures en retard</div><div class="list-sub">Paiement non reçu après échéance</div></div><div class="switch" onclick="toggleSwitch(this)"><div class="switch-knob"></div></div></div></div></div>`;
}
const PAGES = { dashboard:pageDashboard, cabinets:pageCabinets, pipeline:pagePipeline, activites:pageActivites, audits:pageAudits, abonnements:pageAbonnements, contrats:pageContrats, facturation:pageFacturation, heures:pageHeures, parametres:pageParametres };
let currentPage='dashboard';
function navigate(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.getElementById('pages').innerHTML=`<div class="page active">${PAGES[page]()}</div>`;
  refreshIcons();
  if(page==='dashboard') setTimeout(renderChart,30);
  if(page==='cabinets') bindCabinetTabs();
  if(page==='heures') updateTimerDisplay();
}
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>navigate(n.dataset.page)));
function bindCabinetTabs(){ document.querySelectorAll('#cabinetTabs .tab').forEach(t=>t.addEventListener('click',()=>{ document.querySelectorAll('#cabinetTabs .tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); document.getElementById('cabinetRows').innerHTML=cabinetRows(t.dataset.f); refreshIcons(); })); }
function openDetail(id){
  const c=cabinets.find(x=>x.id===id); if(!c) return;
  const neg=c.trustSolde<0;
  document.getElementById('detailPanel').innerHTML=`<div class="detail-head"><div class="detail-head-top"><div class="detail-firm"><div class="detail-avatar">${initials(c.nom)}</div><div><div class="detail-name">${c.nom}</div><div class="detail-meta-row">${planBadge(c.plan)}${statutBadge(c.statut)}</div></div></div><button class="icon-btn" onclick="closeDetail()">${icon('x')}</button></div><div style="display:flex;align-items:center;gap:var(--space-2)"><span class="kpi-label">Score de santé</span><span class="score ${scoreClass(c.score)} tnum" style="font-size:var(--text-lg)">${c.score}</span></div></div>
  <div class="detail-body"><div class="detail-section"><div class="detail-section-title">Informations</div><div class="detail-kv"><span class="k">Avocat principal</span><span class="v">${c.avocat}</span></div><div class="detail-kv"><span class="k">Province</span><span class="v">${c.province}</span></div><div class="detail-kv"><span class="k">Domaine</span><span class="v">${c.domaine}</span></div><div class="detail-kv"><span class="k">Logiciel actuel</span><span class="v">${c.logiciel}</span></div><div class="detail-kv"><span class="k">Source du lead</span><span class="v">${c.source}</span></div><div class="detail-kv"><span class="k">MRR</span><span class="v tnum">${c.mrr?money(c.mrr)+' $':'Essai'}</span></div><div class="detail-kv"><span class="k">Dernier audit</span><span class="v">${c.dernierAudit}</span></div></div>
  <div class="detail-section"><div class="detail-section-title">Comptabilité fidéicommis</div><div class="detail-kv"><span class="k">Solde</span><span class="v tnum" style="${neg?'color:var(--error)':''}">${money(c.trustSolde)} $</span></div><div class="detail-kv"><span class="k">Dernière réconciliation</span><span class="v">${c.trustReconcil}</span></div><div class="detail-kv"><span class="k">Transactions ce mois</span><span class="v tnum">${c.trustTx}</span></div>${neg?'<div class="alert-item" style="margin-top:var(--space-3)"><div class="alert-icon">'+icon('octagon-alert')+'</div><div class="alert-grow"><div class="alert-reason">Solde négatif — intervention requise (Barreau)</div></div></div>':''}</div>
  <div class="detail-section"><div class="detail-section-title">Historique</div>${c.timeline.map(t=>`<div class="timeline-item"><span class="timeline-dot" style="background:${t.c==='green'?'var(--success)':t.c==='amber'?'var(--warning)':t.c==='red'?'var(--error)':'var(--accent)'}"></span><div><div class="timeline-text">${t.t}</div><div class="timeline-time">${t.d}</div></div></div>`).join('')}</div>
  <div class="detail-section"><div class="detail-section-title">Actions</div><div class="detail-actions"><button class="btn btn-primary" onclick="toast('info','Ouverture compta — ${c.nom}')">${icon('calculator')} Accéder compta</button><button class="btn" onclick="toast('info','Contrat ouvert')">${icon('file-signature')} Contrat</button><button class="btn" onclick="openModal('facture')">${icon('receipt')} Facture</button><button class="btn" onclick="toast('success','Email ouvert')">${icon('mail')} Email</button><button class="btn" style="grid-column:span 2" onclick="openModal('audit')">${icon('shield-check')} Lancer un audit</button></div></div></div>`;
  document.getElementById('detailPanel').classList.add('open'); refreshIcons();
}
function closeDetail(){ document.getElementById('detailPanel').classList.remove('open'); }
const MODALS = {
  cabinet:{title:'Nouveau cabinet',wide:false,body:`<div class="field"><label>Nom du cabinet</label><input class="input" placeholder="Cabinet Exemple Avocats" /></div><div class="field-row"><div class="field"><label>Avocat principal</label><input class="input" placeholder="Me Prénom Nom" /></div><div class="field"><label>Téléphone</label><input class="input" placeholder="514-555-0000" /></div></div><div class="field"><label>Courriel</label><input class="input" placeholder="contact@cabinet.ca" /></div><div class="field"><label>Plan</label><select class="select"><option>Essentiel — 99 $/mois</option><option>Pro — 149 $/mois</option><option>Pro+ — À partir de 300 $/mois</option></select></div><div class="field-row"><div class="field"><label>Province</label><select class="select"><option>Québec</option><option>Ontario</option></select></div><div class="field"><label>Domaine</label><select class="select"><option>Droit civil</option><option>Droit familial</option><option>Droit criminel</option><option>Droit des affaires</option><option>Immobilier</option></select></div></div><div class="field-row"><div class="field"><label>Logiciel actuel</label><input class="input" placeholder="Excel, Clio…" /></div><div class="field"><label>Source du lead</label><select class="select"><option>Cold email</option><option>LinkedIn</option><option>Référence</option><option>Audit gratuit</option></select></div></div>`,cta:'Créer le cabinet'},
  deal:{title:'Nouveau deal',wide:false,body:`<div class="field"><label>Cabinet</label><input class="input" placeholder="Nom du cabinet prospect" /></div><div class="field"><label>Contact</label><input class="input" placeholder="Me Prénom Nom" /></div><div class="field-row"><div class="field"><label>Étape</label><select class="select">${pipelineStages.map(s=>`<option>${s.name}</option>`).join('')}</select></div><div class="field"><label>Plan visé</label><select class="select"><option>Essentiel</option><option>Pro</option><option>Pro+</option></select></div></div><div class="field-row"><div class="field"><label>Source</label><select class="select"><option>Cold email</option><option>LinkedIn</option><option>Référence</option><option>Audit gratuit</option></select></div><div class="field"><label>Valeur ARR estimée</label><input class="input" placeholder="1788" /></div></div>`,cta:'Créer le deal'},
  activite:{title:'Nouvelle activité',wide:false,body:`<div class="field"><label>Type</label><select class="select"><option>Email</option><option>Appel</option><option>Démo</option><option>Note interne</option></select></div><div class="field"><label>Cabinet</label><select class="select">${cabinets.map(c=>`<option>${c.nom}</option>`).join('')}</select></div><div class="field"><label>Notes</label><textarea class="textarea" placeholder="Détails de l'interaction…"></textarea></div><div class="field"><label>Tâche de suivi (optionnel)</label><input class="input" placeholder="Ex: Relancer dans 3 jours" /></div>`,cta:'Enregistrer'},
  audit:{title:'Nouvel audit',wide:false,body:`<div class="field"><label>Cabinet</label><select class="select">${cabinets.map(c=>`<option>${c.nom}</option>`).join('')}</select></div><div class="field"><label>Type d'audit</label><select class="select"><option>Réconciliation fidéicommis</option><option>Registre chronologique</option><option>Audit complet</option></select></div>`,cta:'Lancer l\'audit'},
  rabais:{title:'Appliquer un rabais',wide:false,body:`<div class="field-row"><div class="field"><label>Type</label><select class="select"><option>Pourcentage (%)</option><option>Montant ($)</option></select></div><div class="field"><label>Valeur</label><input class="input" placeholder="15" /></div></div><div class="field"><label>Durée</label><select class="select"><option>1 mois</option><option>3 mois</option><option>6 mois</option><option>Permanent</option></select></div><div class="field"><label>Raison</label><textarea class="textarea" placeholder="Ex: Cabinet fondateur…"></textarea></div>`,cta:'Appliquer'},
  contrat:{title:'Nouveau contrat',wide:false,body:`<div class="field"><label>Cabinet</label><select class="select">${cabinets.map(c=>`<option>${c.nom}</option>`).join('')}</select></div><div class="field"><label>Type de contrat</label><select class="select"><option>Entente de service</option><option>Entente fondateur</option><option>Avenant</option></select></div><div class="field-row"><div class="field"><label>Plan</label><select class="select"><option>Essentiel</option><option>Pro</option><option>Pro+</option></select></div><div class="field"><label>Signature</label><select class="select"><option>DocuSign</option><option>PDF manuel</option></select></div></div>`,cta:'Créer le contrat'},
  facture:{title:'Nouvelle facture',wide:true,body:`<div class="field"><label>Cabinet</label><select class="select">${cabinets.map(c=>`<option>${c.nom}</option>`).join('')}</select></div><label style="font-size:var(--text-xs);color:var(--text-2);font-weight:500;display:block;margin-bottom:var(--space-2)">Lignes</label><div id="invLines"><div class="inv-line"><input class="input" placeholder="Description" value="Abonnement SAFE — Pro" /><input class="input tnum" value="1" /><input class="input tnum inv-amt" value="149" oninput="calcInvoice()" /><button class="icon-btn" onclick="this.parentElement.remove();calcInvoice()">${icon('x')}</button></div></div><button class="btn btn-sm" style="margin-top:var(--space-2)" onclick="addInvLine()">${icon('plus')} Ajouter une ligne</button><div class="inv-totals" id="invTotals"></div>`,cta:'Envoyer',cta2:'Brouillon'},
};
function openModal(key){
  const m=MODALS[key]; if(!m) return;
  document.getElementById('modalRoot').innerHTML=`<div class="modal ${m.wide?'wide':''}"><div class="modal-head"><div class="modal-title">${m.title}</div><button class="icon-btn" onclick="closeModal()">${icon('x')}</button></div><div class="modal-body">${m.body}</div><div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button>${m.cta2?`<button class="btn" onclick="submitModal('${key}','draft')">${m.cta2}</button>`:''}<button class="btn btn-primary" onclick="submitModal('${key}')">${m.cta}</button></div></div>`;
  document.getElementById('modalRoot').classList.add('open'); refreshIcons();
  if(key==='facture') calcInvoice();
}
function closeModal(){ document.getElementById('modalRoot').classList.remove('open'); document.getElementById('modalRoot').innerHTML=''; }
function submitModal(key,mode){ const msgs={cabinet:'Cabinet créé',deal:'Deal ajouté au pipeline',activite:'Activité enregistrée',audit:'Audit lancé',rabais:'Rabais appliqué',contrat:'Contrat créé',facture:mode==='draft'?'Brouillon sauvegardé':'Facture envoyée'}; closeModal(); toast('success',msgs[key]||'Enregistré'); }
document.getElementById('modalRoot').addEventListener('click',e=>{ if(e.target.id==='modalRoot') closeModal(); });
function addInvLine(){ const div=document.createElement('div'); div.className='inv-line'; div.innerHTML=`<input class="input" placeholder="Description" /><input class="input tnum" value="1" /><input class="input tnum inv-amt" value="0" oninput="calcInvoice()" /><button class="icon-btn" onclick="this.parentElement.remove();calcInvoice()">${icon('x')}</button>`; document.getElementById('invLines').appendChild(div); refreshIcons(); calcInvoice(); }
function calcInvoice(){ let sub=0; document.querySelectorAll('.inv-amt').forEach(a=>sub+=parseFloat(a.value)||0); const tps=sub*0.05,tvq=sub*0.09975,tot=sub+tps+tvq; const el=document.getElementById('invTotals'); if(!el) return; el.innerHTML=`<div class="inv-total-row"><span>Sous-total</span><span class="tnum">${sub.toFixed(2)} $</span></div><div class="inv-total-row"><span>TPS (5%)</span><span class="tnum">${tps.toFixed(2)} $</span></div><div class="inv-total-row"><span>TVQ (9,975%)</span><span class="tnum">${tvq.toFixed(2)} $</span></div><div class="inv-total-row grand"><span>Total TTC</span><span class="tnum">${tot.toFixed(2)} $</span></div>`; }
function toast(type,msg){ const icons={success:'check-circle',error:'x-circle',warning:'alert-triangle',info:'info'}; const el=document.createElement('div'); el.className=`toast ${type}`; el.innerHTML=`${icon(icons[type])}<span class="toast-msg">${msg}</span>`; document.getElementById('toastWrap').appendChild(el); refreshIcons(); setTimeout(()=>{ el.style.transition='opacity .3s,transform .3s'; el.style.opacity='0'; el.style.transform='translateX(120%)'; setTimeout(()=>el.remove(),300); },3000); }
function toggleTheme(){ const html=document.documentElement; const dark=html.dataset.theme==='dark'; html.dataset.theme=dark?'light':'dark'; document.querySelector('#themeToggle i').dataset.lucide=dark?'sun':'moon'; refreshIcons(); if(currentPage==='dashboard') setTimeout(renderChart,30); }
document.getElementById('themeToggle').addEventListener('click',toggleTheme);
function renderChart(){ const cv=document.getElementById('mrrChart'); if(!cv) return; if(window._mrrChart) window._mrrChart.destroy(); const dark=document.documentElement.dataset.theme==='dark'; const ctx=cv.getContext('2d'); const grad=ctx.createLinearGradient(0,0,0,240); grad.addColorStop(0,'rgba(0,180,180,0.25)'); grad.addColorStop(1,'rgba(0,180,180,0)'); window._mrrChart=new Chart(ctx,{ type:'line', data:{ labels:mrrHistory.labels, datasets:[{ data:mrrHistory.data, borderColor:'#00b4b4', backgroundColor:grad, fill:true, tension:0.35, borderWidth:2, pointRadius:3, pointBackgroundColor:'#00b4b4', pointBorderColor:dark?'#141414':'#fff', pointBorderWidth:2 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>c.parsed.y+' $' } } }, scales:{ y:{ grid:{color:dark?'#222':'#eee'}, ticks:{color:dark?'#6b6b6b':'#a1a1aa',callback:v=>v+' $'} }, x:{ grid:{display:false}, ticks:{color:dark?'#6b6b6b':'#a1a1aa'} } } } }); }
let timerSec=0,timerInt=null,timerRunning=false;
function fmtTime(s){ const h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor(s%3600/60)).padStart(2,'0'),x=String(s%60).padStart(2,'0'); return `${h}:${m}:${x}`; }
function updateTimerDisplay(){ const d=document.getElementById('timerDisplay'); if(d){ d.textContent=fmtTime(timerSec); d.classList.toggle('running',timerRunning); } }
function timerStart(){ if(timerRunning) return; timerRunning=true; updateTimerDisplay(); timerInt=setInterval(()=>{ timerSec++; updateTimerDisplay(); },1000); toast('info','Chronomètre démarré'); }
function timerPause(){ timerRunning=false; clearInterval(timerInt); updateTimerDisplay(); }
function timerStop(){ if(timerSec===0){ toast('warning','Aucun temps à enregistrer'); return; } timerRunning=false; clearInterval(timerInt); timeEntries.unshift({date:'Auj.',cabinet:'Cabinet Roy & Filles',tache:'Audit',duree:fmtTime(timerSec).slice(0,5),facturable:true}); timerSec=0; updateTimerDisplay(); const rows=document.getElementById('timeRows'); if(rows){ rows.innerHTML=timeRows(); refreshIcons(); } toast('success','Temps enregistré'); }
function delTime(i){ timeEntries.splice(i,1); document.getElementById('timeRows').innerHTML=timeRows(); refreshIcons(); toast('success','Entrée supprimée'); }
function toggleSwitch(el){ el.classList.toggle('on'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeDetail(); } });
navigate('dashboard'); refreshIcons();
</script>
</body>
</html>
