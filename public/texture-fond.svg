<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="grain" x="0" y="0">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
    <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
    <feComponentTransfer in="mono" result="adj">
      <feFuncR type="linear" slope="0.6" intercept="0.2"/>
      <feFuncG type="linear" slope="0.6" intercept="0.2"/>
      <feFuncB type="linear" slope="0.6" intercept="0.2"/>
    </feComponentTransfer>
  </filter>
  <rect width="100%" height="100%" fill="rgba(255,255,255,0.5)" filter="url(#grain)"/>
</svg>
