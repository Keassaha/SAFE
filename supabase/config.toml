# SAFE Module A — Supabase project config
# Run: npx supabase link (then) npx supabase db push

[project]
id = "safe-module-a"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"

[auth.email]
enable_signup = true
